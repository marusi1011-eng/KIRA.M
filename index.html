<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>JobMatch Cloud</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;}
.container {max-width:400px;margin:auto;padding:20px;}
input,button{width:100%;padding:10px;margin:5px;border-radius:10px;border:none;}
button{background:#22c55e;color:white;}
.chat{height:150px;overflow:auto;background:#020617;padding:10px;}
</style>
</head>

<body>

<div class="container">

<h2>💼 JobMatch Cloud</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Регистрация</button>
<button onclick="login()">Вход</button>

<div id="app" style="display:none;">

<h3>Добавить вакансию</h3>
<input id="jobTitle" placeholder="Название">
<button onclick="addJob()">Добавить</button>

<h3>Вакансии</h3>
<div id="jobs"></div>

<h3>💬 Чат</h3>
<div class="chat" id="chat"></div>
<input id="msg">
<button onclick="sendMsg()">Отправить</button>

<h3>🤖 AI помощник</h3>
<input id="aiInput" placeholder="Спроси AI">
<button onclick="askAI()">Спросить</button>
<div id="aiAnswer"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 ВСТАВЬ СВОЙ CONFIG
const firebaseConfig = {
  apiKey: "ТВОЙ",
  authDomain: "ТВОЙ",
  projectId: "ТВОЙ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// РЕГИСТРАЦИЯ
window.register = () => {
createUserWithEmailAndPassword(auth,email.value,password.value)
.then(()=>alert("OK"));
}

// ВХОД
window.login = () => {
signInWithEmailAndPassword(auth,email.value,password.value)
.then(()=>{
appDiv.style.display="block";
loadJobs();
loadChat();
});
}

// ВАКАНСИИ
window.addJob = async () => {
await addDoc(collection(db,"jobs"),{
title:jobTitle.value
});
}

// ЧТЕНИЕ ВАКАНСИЙ
function loadJobs(){
onSnapshot(collection(db,"jobs"),snap=>{
jobs.innerHTML="";
snap.forEach(doc=>{
jobs.innerHTML+=`<div>${doc.data().title}</div>`;
});
});
}

// ЧАТ
window.sendMsg = async () => {
await addDoc(collection(db,"chat"),{
text:msg.value,
user:auth.currentUser.email
});
}

// ЧТЕНИЕ ЧАТА
function loadChat(){
onSnapshot(collection(db,"chat"),snap=>{
chat.innerHTML="";
snap.forEach(doc=>{
let m=doc.data();
chat.innerHTML+=`<div>${m.user}: ${m.text}</div>`;
});
});
}

// AI (через API)
window.askAI = async () => {
let res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer ТВОЙ_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:aiInput.value}]
})
});
let data = await res.json();
aiAnswer.innerText = data.choices[0].message.content;
}

</script>

</body>
</html>
